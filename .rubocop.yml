plugins:
  - rubocop-rails
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  Exclude:
    - "db/schema.rb"
    - "db/migrate/**/*"
    - "vendor/**/*"
    - "bin/**/*"
    - "node_modules/**/*"
    - "tmp/**/*"
    - "log/**/*"

# ── Style ────────────────────────────────────────────────────────────────────

# Not worth the noise in a small Rails app
Style/FrozenStringLiteralComment:
  Enabled: false

# Class-level comments aren't needed here
Style/Documentation:
  Enabled: false

# Rails convention: open framework classes in compact style (e.g. class ActiveSupport::TestCase)
Style/ClassAndModuleChildren:
  Enabled: false

# Prefer double quotes everywhere (matches ERB convention)
Style/StringLiterals:
  EnforcedStyle: single_quotes

# ── Metrics ──────────────────────────────────────────────────────────────────

Metrics/MethodLength:
  Max: 20

Metrics/AbcSize:
  Max: 35

Metrics/BlockLength:
  Max: 40

# ── Rails ────────────────────────────────────────────────────────────────────

# Models inherit from ActiveRecord::Base — leave for a dedicated refactor
Rails/ApplicationRecord:
  Enabled: false

# No managed migrations in this project — skip the DB index check
Rails/UniqueValidationWithoutIndex:
  Enabled: false

# Small app: locale extraction not worth the overhead
Rails/I18nLocaleTexts:
  Enabled: false

# Flash before redirect is correct Rails usage; .now is only for render
Rails/ActionControllerFlashBeforeRender:
  Enabled: false

# ── Layout ───────────────────────────────────────────────────────────────────

Layout/LineLength:
  Max: 120
  AllowedPatterns:
    - "\\A\\s*#"   # comments
